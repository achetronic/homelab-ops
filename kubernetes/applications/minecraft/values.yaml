# Ref: https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.yaml

defaultPodOptions:
    labels: {}

controllers:
  minecraft:
    type: statefulset
    replicas: 1
    containers:
      main:
        image:
          repository: itzg/minecraft-server
          tag: 2026.6.0
          pullPolicy: Always

        envFrom:
          - configMapRef:
              identifier: config

        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: '2'
            memory: 4Gi

configMaps:
  config:
    enabled: true
    data:
      # Ref: https://docker-minecraft-server.readthedocs.io/en/latest/variables
      EULA: "TRUE"
      DIFFICULTY: "normal"
      MODE: "survival"

      # Paper keeps the door open to Bukkit/Spigot plugins later.
      # Ref: https://docker-minecraft-server.readthedocs.io/en/latest/types-and-platforms/server-types/paper/
      TYPE: "PAPER"
      VERSION: "26.1.2"

      # Online mode (real auth) is required: Drasl validates each connection.
      # Ref: https://docker-minecraft-server.readthedocs.io/en/latest/misc/online-mode/
      ONLINE_MODE: "TRUE"

      # Redirect the server's auth/session calls to Drasl instead of Mojang.
      # Ref: https://github.com/unmojang/drasl/blob/master/doc/usage.md
      JVM_OPTS: >-
        -Dminecraft.api.env=custom
        -Dminecraft.api.auth.host=https://auth.minecraft.public.internal.place/auth
        -Dminecraft.api.account.host=https://auth.minecraft.public.internal.place/account
        -Dminecraft.api.profiles.host=https://auth.minecraft.public.internal.place/account
        -Dminecraft.api.session.host=https://auth.minecraft.public.internal.place/session
        -Dminecraft.api.services.host=https://auth.minecraft.public.internal.place/services

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: "standard-nfs"
    globalMounts:
      - path: /data

service:
  minecraft:
    controller: minecraft
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.2.69
    ports:
      tcp-minecraft:
        primary: true
        port: 25565
        protocol: TCP
        targetPort: 25565
