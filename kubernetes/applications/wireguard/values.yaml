# app-template (bjw-s). Ref: https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
#
# WireGuard server with keys generated in-pod and persisted to a PVC. The
# keygen initContainer only creates them if missing, so restarts rotate
# nothing. It renders wg0.conf and each peer's .conf into /config/peer_confs.
# The PVC is the only copy of the keys: if lost, peers must re-enroll.
#
# Grab a peer's config:
#   k exec -n wireguard deploy/wireguard -- cat /config/peer_confs/peer1.conf
# Or scan the QR codes directly from the initContainer logs:
#   k logs -n wireguard deploy/wireguard -c keygen
# Or print a saved QR code from the running pod:
#   k exec -n wireguard deploy/wireguard -- cat /config/peer_confs/peer1_qr.txt

controllers:
  wireguard:
    type: deployment
    replicas: 1   # stateful UDP handshake endpoint, does not scale horizontally

    initContainers:
      sysctls:
        image:
          repository: busybox
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            # Essential for WireGuard routing
            sysctl -w net.ipv4.ip_forward=1
            sysctl -w net.ipv4.conf.all.src_valid_mark=1
        securityContext: &securityContextSpec
          capabilities:
            add:
              - NET_ADMIN
          privileged: true

      keygen:
        image:
          repository: alpine   # simple, raw Alpine instead of bloated linuxserver
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            # util-linux provides the flock binary for safe file locking
            apk add --no-cache wireguard-tools util-linux libqrencode-tools
            set -eu
            umask 077

            mkdir -p /config
            # Defense in depth: exclusive file lock. If another pod (e.g. during
            # a rolling update) is writing, this pod will wait patiently here.
            exec 9> /config/keygen.lock
            flock -x 9

            ###################### CONFIG (edit me) ##################################################################################
            ENDPOINT="gateway.external.place:51820"          # public host:port the peers connect to
            NET="10.31.0.0/24"                               # tunnel subnet; server takes .1, peers .2, .3, ...
            LISTEN_PORT="51820"                              # UDP port WireGuard listens on inside the pod
            PEERS="5"                                        # number of peer keypairs + client configs to generate
            MTU="1280"                                       # tunnel MTU; 1280 is the absolute safe minimum (IPv6 requirement)
            MSS="1240"                                       # TCP MSS to clamp to; leave empty for auto (--clamp-mss-to-pmtu)
            DNS="10.96.100.10"                               # DNS server pushed to the peers (cluster CoreDNS)
            ALLOWED_IPS="0.0.0.0/0, ::/0"                    # what each peer routes through the VPN: 0.0.0.0/0 = ALL its traffic; list your subnets instead to only reach the home network
            KEEPALIVE="25"                                   # seconds between keepalives; keeps NAT mappings open
            EGRESS_IF="eth0"                                 # pod interface used to NAT (MASQUERADE) peers to the internet
            ##########################################################################################################################

            CIDR="${NET#*/}"; PREFIX="${NET%.*}"
            [ -n "$MSS" ] && CLAMP="--set-mss $MSS" || CLAMP="--clamp-mss-to-pmtu"

            K=/config/keys
            mkdir -p "$K" /config/wg_confs /config/peer_confs

            # 1. Server keys
            [ -f "$K/server.key" ] || wg genkey > "$K/server.key"
            [ -f "$K/server.pub" ] || wg pubkey < "$K/server.key" > "$K/server.pub"

            # 2. Base server config
            # MSS clamping pins TCP so segments fit the tunnel MTU; %i is expanded to the interface name.
            cat > /config/wg_confs/wg0.conf <<EOF
            [Interface]
            Address = ${PREFIX}.1/${CIDR}
            ListenPort = ${LISTEN_PORT}
            PrivateKey = $(cat "$K/server.key")
            MTU = ${MTU}
            # Prevent wg-quick from creating invasive policy routing that breaks the NAT state machine
            Table = off
            PostUp = iptables -t nat -A POSTROUTING -o ${EGRESS_IF} -j MASQUERADE; iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t mangle -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS ${CLAMP}; iptables -t mangle -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -o %i -j TCPMSS ${CLAMP}
            PostDown = iptables -t nat -D POSTROUTING -o ${EGRESS_IF} -j MASQUERADE; iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t mangle -D FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS ${CLAMP}; iptables -t mangle -D OUTPUT -p tcp --tcp-flags SYN,RST SYN -o %i -j TCPMSS ${CLAMP}
            EOF

            # 3. Process peers: generate keys, append to server, write client config
            n=1
            while [ "$n" -le "$PEERS" ]; do
              [ -f "$K/peer$n.key" ] || wg genkey > "$K/peer$n.key"
              [ -f "$K/peer$n.pub" ] || wg pubkey < "$K/peer$n.key" > "$K/peer$n.pub"
              [ -f "$K/peer$n.psk" ] || wg genpsk > "$K/peer$n.psk"

              ip="${PREFIX}.$((n + 1))"

              cat >> /config/wg_confs/wg0.conf <<EOF

            [Peer]
            # peer$n
            PublicKey = $(cat "$K/peer$n.pub")
            PresharedKey = $(cat "$K/peer$n.psk")
            AllowedIPs = ${ip}/32
            EOF

              cat > /config/peer_confs/peer$n.conf <<EOF
            [Interface]
            # Configuration for peer: $n
            PrivateKey = $(cat "$K/peer$n.key")
            Address = ${ip}/32
            DNS = ${DNS}
            MTU = ${MTU}

            [Peer]
            PublicKey = $(cat "$K/server.pub")
            PresharedKey = $(cat "$K/peer$n.psk")
            Endpoint = ${ENDPOINT}
            AllowedIPs = ${ALLOWED_IPS}
            PersistentKeepalive = ${KEEPALIVE}
            EOF

              echo "=================================================================="
              echo " QR Code for peer$n"
              echo "=================================================================="
              qrencode -t ansiutf8 < /config/peer_confs/peer$n.conf | tee /config/peer_confs/peer${n}_qr.txt
              echo ""

              n=$((n + 1))
            done

            chmod 600 /config/wg_confs/wg0.conf /config/peer_confs/*.conf

    containers:
      main:
        image:
          repository: alpine
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            apk add --no-cache wireguard-tools iptables iproute2
            wg-quick up /config/wg_confs/wg0.conf

            # Keep pod alive and teardown gracefully on exit
            trap "wg-quick down /config/wg_confs/wg0.conf" INT TERM
            sleep infinity & wait
        securityContext: *securityContextSpec

service:
  backend:
    controller: wireguard
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.2.68
    type: LoadBalancer
    ports:
      vpn:
        port: 31820
        protocol: UDP
        targetPort: 51820

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    size: 1Gi
    storageClass: standard-nfs
    retain: true
    globalMounts:
      - path: /config

# Some stuff not covered by this chart
rawResources:

  # Disaster Recovery strategy
  backups-bucket-credentials:
    enabled: true
    manifest:
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: gitlab-secret-store
        target:
          name: backups-bucket-credentials
          template:
            engineVersion: v2
            data:
              RESTIC_REPOSITORY: s3:https://c16c8ed6d0135e8a50024e0eb1c49e51.r2.cloudflarestorage.com/backups-kubernetes/restic/wireguard
              RESTIC_PASSWORD: "{{ `{{ .VOLSYNC_RESTIC_ENCRYPTION_PASSWORD }}` }}"
              AWS_ACCESS_KEY_ID: "{{ `{{ .ACCESS_KEY_ID }}` }}"
              AWS_SECRET_ACCESS_KEY: "{{ `{{ .ACCESS_SECRET_KEY }}` }}"
        data:
          - secretKey: ACCESS_KEY_ID
            remoteRef:
              key: S3_ACCESS_KEY_ID_CNPG

          - secretKey: ACCESS_SECRET_KEY
            remoteRef:
              key: S3_SECRET_ACCESS_KEY_CNPG

          - secretKey: VOLSYNC_RESTIC_ENCRYPTION_PASSWORD
            remoteRef:
              key: VOLSYNC_RESTIC_ENCRYPTION_PASSWORD

  data-backups:
    enabled: true
    manifest:
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      spec:
        sourcePVC: wireguard
        trigger:
          schedule: "0 */4 * * *"
        restic:
          repository: backups-bucket-credentials
          copyMethod: Clone

          storageClassName: ephemeral-nfs

          # Prune the repository (repack to free space) every 2 weeks
          pruneIntervalDays: 14
          retain:
            hourly: 6
            daily: 5
            weekly: 4
            monthly: 2
            yearly: 1
