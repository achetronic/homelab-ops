apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/managed-by: Helm
      pod-security.kubernetes.io/enforce: privileged
    includeSelectors: false
    includeTemplates: false

commonAnnotations:
  meta.helm.sh/release-name: special-namespaces
  meta.helm.sh/release-namespace: default

resources:
  - congatudo.yaml
  - csi-driver-nfs.yaml
  - csi-driver-s3.yaml
  - home-assistant.yaml
  - keycloak.yaml
  - metallb.yaml
  - nuclio.yaml
  - omada-controller.yaml
  - tunnels.yaml
  - wireguard.yaml
