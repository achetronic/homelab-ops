# We are using a meta Helm chart called app-template from bwj-s.
# Reference values can be inspected there.
# Ref: https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml

# Avoid creating an unprivileged ServiceAccount (v5 default behaviour)
global:
  createDefaultServiceAccount: false

defaultPodOptions:
  labels: {}
  annotations: {}
  hostname: blocky-hostname
  restartPolicy: Always

controllers:
  blocky:
    type: deployment
    replicas: 3
    strategy: Recreate

    labels: {}
    annotations: {}

    containers:
      blocky:
        image:
          repository: spx01/blocky
          tag: latest
          pullPolicy: IfNotPresent

        env:
          - name: TZ
            value: Europe/Berlin

        ports:
          - containerPort: 53
            protocol: TCP
          - containerPort: 53
            protocol: UDP
          - containerPort: 4000
            protocol: TCP

configMaps:
  config:
    enabled: true
    forceRename: blocky-config
    annotations: {}
    data:
      config.yml: |
        # Forward DNS requests related to domain 'cluster.local' to kube DNS
        conditional:
          fallbackUpstream: false
          mapping:
            cluster.local: 10.96.0.10

        # Forward not-found DNS requests to Opnsense's Unbound
        upstream:
          default:
            - 192.168.2.1

        # Set several ads block lists (loaded on runtime)
        # Ref: https://github.com/lightswitch05/hosts
        # Ref: https://github.com/StevenBlack/hosts
        blocking:
          blackLists:
            ads:
              - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
              - https://www.github.developerdan.com/hosts/lists/ads-and-tracking-extended.txt
          clientGroupsBlock:
            default:
              - ads

        # TODO
        port: 53
        httpPort: 4000

service: {}

rawResources:
  blocky-service:
    enabled: true
    forceRename: blocky
    manifest:
      apiVersion: v1
      kind: Service
      metadata:
        namespace: blocky
        annotations:
          metallb.universe.tf/loadBalancerIPs: 192.168.2.61
      spec:
        type: LoadBalancer
        clusterIP: 10.96.100.10
        selector:
          app.kubernetes.io/name: blocky
        ports:
          - name: "53"
            port: 53
            protocol: TCP
            targetPort: 53
          - name: 53-udp
            port: 53
            protocol: UDP
            targetPort: 53
          - name: "4000"
            port: 4000
            protocol: TCP
            targetPort: 4000

persistence:
  blocky-data:
    enabled: true
    type: configMap
    name: blocky-config
    advancedMounts:
      blocky:
        blocky:
          - path: /app/config.yml
            subPath: config.yml
            readOnly: false
