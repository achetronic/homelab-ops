<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Signed in</title>
        <style>
            :root {
                color-scheme: dark;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0b0d10;
                background-image: radial-gradient(
                    ellipse 80% 50% at 50% -20%,
                    rgba(120, 130, 155, 0.15),
                    transparent
                );
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                color: #e8eaed;
            }
            .card {
                text-align: center;
                padding: 56px 44px;
                max-width: 360px;
                width: calc(100% - 48px);
                background: rgba(255, 255, 255, 0.04);
                border-radius: 20px;
                backdrop-filter: blur(12px);
            }
            .mark {
                width: 56px;
                height: 56px;
                margin: 0 auto 28px;
                background: rgba(255, 255, 255, 0.25);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            h1 {
                font-size: 19px;
                font-weight: 500;
                letter-spacing: 0.2px;
                margin-bottom: 10px;
            }
            p {
                font-size: 14px;
                line-height: 1.5;
                color: #9aa1ab;
                margin-bottom: 32px;
            }
            .btn {
                display: block;
                padding: 14px 0;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.1);
                color: #e8eaed;
                text-decoration: none;
                font-size: 15px;
                font-weight: 500;
                letter-spacing: 0.3px;
                transition: background 0.2s ease;
            }
            .btn:hover {
                background: rgba(255, 255, 255, 0.16);
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="mark">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M20 6L9 17l-5-5"
                        stroke="#e8eaed"
                        stroke-width="1.8"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                </svg>
            </div>
            <h1>Signed in</h1>
            <p>You can now return to the app to continue.</p>
            <a class="btn" href="__REDIRECT_URL__">Continue</a>
        </div>
        <!-- When opened directly from disk the placeholder is still literal:
             skip the auto-redirect so the page can be previewed in a browser. -->
        <script>
            var target = "__REDIRECT_URL__";
            if (target.indexOf("__") !== 0) {
                window.location.href = target;
            }
        </script>
    </body>
</html>
